name: Release

# Triggered by pushing a version tag: git tag v1.0.1 && git push --tags
# Runs the pack-and-install check on all three OSes before publishing to npm.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    timeout-minutes: 3
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Lint
        run: node scripts/lint.mjs
      - name: Tests
        run: node --test
      - name: Pack + install + smoke
        shell: bash
        run: |
          npm pack --silent > /dev/null
          TARBALL=$(ls lfg-cli-*.tgz | head -1)
          PREFIX=$(mktemp -d)
          npm install -g --prefix "$PREFIX" "./$TARBALL"
          export HOME=$(mktemp -d)
          # npm places the shim differently on Windows vs Unix
          if [ -f "$PREFIX/bin/lfg" ]; then BIN="$PREFIX/bin/lfg"; else BIN="$PREFIX/lfg.cmd"; fi
          "$BIN" --version
          "$BIN" help > /dev/null
          "$BIN" doctor --json

  publish:
    name: Publish to npm
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      id-token: write   # for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
